# ─── Rate Limiting Zones ───
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_uploads:10m rate=10r/m;
limit_req_status 429;

# ─── Rate Limit Indicator Map ───
map $status $is_rate_limited {
    429     "true";
    default "false";
}

# ─── Structured JSON Log Format ───
log_format json_combined escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"server_protocol":"$server_protocol",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"request_id":"$request_id",'
        '"is_rate_limited":$is_rate_limited'
    '}';

upstream api_backend {
    server api:8080;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # ─── Logging ───
    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ─── SSL ───
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Security Headers ───
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # ─── CSP ───
    # PRODUCAO: substituir *.blob.core.windows.net pelo account name especifico
    # (ex: https://ecoturismoblob.blob.core.windows.net) e remover localhost:10000.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.blob.core.windows.net http://localhost:10000; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.blob.core.windows.net http://localhost:10000; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; media-src 'none'; object-src 'none';" always;

    client_max_body_size 10M;

    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ─── Auth endpoints (strict rate limit: 5 req/min) ───
    location /api/auth/ {
        limit_req zone=api_auth burst=3 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
    }

    # ─── Upload endpoints (moderate: 10 req/min) ───
    location /api/uploads/ {
        limit_req zone=api_uploads burst=5 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
    }

    # ─── All other API routes (general: 30 req/s) ───
    location / {
        limit_req zone=api_general burst=60 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
    }
}
