# ============================================================
# docker-compose.yml — EcoTurismo Stack Completa
# ============================================================
# Uso:
#   docker compose up -d          → Subir tudo
#   docker compose logs -f api    → Ver logs da API
#   docker compose down -v        → Parar e limpar volumes
# ============================================================

services:
  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: ecoturismo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsk https://localhost/ || curl -f http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── SQL Server 2022 ───
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecoturismo-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-EcoTurismo@2024!}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./init-db:/init-db
    entrypoint: /bin/bash /init-db/entrypoint.sh
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─── API .NET 8 ───
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecoturismo-api
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EcoTurismo;User Id=sa;Password=${DB_PASSWORD:-EcoTurismo@2024!};TrustServerCertificate=true;"
      Jwt__Secret: "${JWT_SECRET:-SuaChaveSecretaComPeloMenos32CaracteresParaProducao!}"
      Jwt__Issuer: "EcoTurismo.API"
      Jwt__Audience: "EcoTurismo.Frontend"
      Frontend__Url: "${FRONTEND_URL:-http://localhost:5173}"
      AzureBlobStorage__ConnectionString: "${AZURE_BLOB_CONNECTION:-}"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  # ─── Azurite (emulador Azure Blob local) ───
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: ecoturismo-azurite
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000"
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data
    restart: unless-stopped

volumes:
  sqlserver-data:
  azurite-data:
